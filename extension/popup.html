<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #0a0a0a;
    --bg-2: #141414;
    --bg-3: #1e1e1e;
    --border: #2a2a2a;
    --text: #e5e5e5;
    --muted: #888;
    --accent: #3b82f6;
    --purple: #a855f7;
    --green: #22c55e;
    --red: #ef4444;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    width: 380px;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 12px;
  }
  .wrap { padding: 14px; }
  .header {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 10px;
    font-size: 13px; font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--purple));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  label {
    display: block; font-size: 10px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.5px; margin: 10px 0 4px;
  }
  input[type="text"], textarea, select {
    width: 100%; padding: 7px 10px;
    background: var(--bg-3); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-size: 12px; font-family: inherit; outline: none;
    transition: border-color 0.15s;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 60px; max-height: 260px; line-height: 1.4; }
  textarea::-webkit-scrollbar { width: 6px; }
  textarea::-webkit-scrollbar-track { background: transparent; }
  textarea::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }
  textarea::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }
  textarea { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.12) transparent; }
  .thread-picker { position: relative; }
  .thread-picker input { padding-right: 24px; }
  .thread-picker-clear {
    position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 14px; padding: 2px 6px; line-height: 1; display: none;
  }
  .thread-picker-clear.visible { display: block; }
  .thread-picker-clear:hover { color: var(--red); }
  .url-display {
    font-size: 10px; color: var(--muted); word-break: break-all;
    padding: 4px 0; max-height: 28px; overflow: hidden;
  }
  .row { display: flex; gap: 6px; align-items: center; }
  .sources { display: flex; gap: 4px; flex-wrap: wrap; }
  .src-pill {
    padding: 3px 8px; font-size: 10px; font-weight: 600;
    border: 1px solid var(--border); border-radius: 10px;
    background: none; color: var(--muted); cursor: pointer;
  }
  .src-pill.active { background: rgba(168,85,247,0.15); border-color: rgba(168,85,247,0.4); color: var(--purple); }
  button.primary {
    width: 100%; margin-top: 12px;
    padding: 9px; font-size: 12px; font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--purple));
    border: none; border-radius: 6px; color: white; cursor: pointer;
  }
  button.primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .split-btn {
    display: flex; width: 100%; margin-top: 12px;
    border-radius: 6px; overflow: hidden;
    background: linear-gradient(135deg, var(--accent), var(--purple));
  }
  .split-btn button {
    flex: 1; padding: 9px 6px; font-size: 12px; font-weight: 700;
    background: transparent; border: none; color: white; cursor: pointer;
    transition: background 0.15s;
  }
  .split-btn button:hover:not(:disabled) { background: rgba(255,255,255,0.12); }
  .split-btn button:disabled { opacity: 0.4; cursor: not-allowed; }
  .split-btn .divider { width: 1px; background: rgba(255,255,255,0.3); flex-shrink: 0; }
  .status { font-size: 11px; padding: 8px 0 0; min-height: 16px; }
  .status.success { color: var(--green); }
  .status.error { color: var(--red); }
  .settings-link {
    display: block; text-align: center; margin-top: 8px;
    font-size: 10px; color: var(--muted); text-decoration: none;
  }
  .settings-link:hover { color: var(--accent); }
  /* Mode toggle */
  .mode-toggle {
    display: flex; background: var(--bg-3);
    border: 1px solid var(--border); border-radius: 6px;
    margin-bottom: 10px; overflow: hidden;
  }
  .mode-btn {
    flex: 1; padding: 6px; font-size: 11px; font-weight: 600;
    background: none; border: none; color: var(--muted); cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .mode-btn.active {
    background: linear-gradient(135deg, rgba(59,130,246,0.2), rgba(168,85,247,0.2));
    color: var(--text);
  }
  .email-hint {
    font-size: 10px; color: var(--accent); text-align: center;
    margin: -6px 0 8px; display: none;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">📎 SignalVault Clipper</div>

  <div class="mode-toggle">
    <button class="mode-btn active" id="mode-signal-btn">Signal</button>
    <button class="mode-btn" id="mode-document-btn">Document</button>
  </div>
  <div class="email-hint" id="email-hint">✉ Email detected — switched to Document mode</div>

  <label>Title</label>
  <input type="text" id="title" placeholder="Page title" />

  <label>URL</label>
  <div class="url-display" id="url-display"></div>

  <!-- Signal-mode elements -->
  <div id="signal-only">
    <label>Source</label>
    <div class="sources" id="sources">
      <button class="src-pill active" data-source="news">News</button>
      <button class="src-pill" data-source="linkedin">LinkedIn</button>
      <button class="src-pill" data-source="twitter">X / Twitter</button>
      <button class="src-pill" data-source="reddit">Reddit</button>
      <button class="src-pill" data-source="manual">Other</button>
    </div>

    <label>Thread <span style="color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0">(optional — leave blank for auto-assign)</span></label>
    <div class="thread-picker">
      <input type="text" id="thread-input" list="thread-list" placeholder="Type to search or leave blank…" autocomplete="off" />
      <button type="button" class="thread-picker-clear" id="thread-clear" title="Clear">×</button>
      <datalist id="thread-list"></datalist>
    </div>

    <label>Notes / selected text</label>
    <textarea id="content" placeholder="Selected text will appear here, or add a note…"></textarea>

    <div class="split-btn" id="save-split">
      <button id="save-signal-btn" title="Capture as signal (Ctrl+Enter)">Capture Signal</button>
      <div class="divider"></div>
      <button id="save-thread-btn" title="Create a new thread from this capture (Ctrl+Shift+Enter)">Create Thread</button>
    </div>
  </div>

  <!-- Document-mode elements -->
  <div id="doc-only" style="display:none">
    <label>From</label>
    <div class="url-display" id="doc-from-display"></div>
    <button class="primary" id="save-doc-btn">Save as Document</button>
  </div>

  <div class="status" id="status"></div>
  <a href="#" id="settings-link" class="settings-link">⚙ Settings</a>
</div>
<script src="popup.js"></script>
</body>
</html>
